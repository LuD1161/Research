site_name: Security Research
site_description: Automated security review of WordPress plugins and npm packages using LLM agents
repo_url: https://github.com/LuD1161/Research

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Pipeline:
    - Architecture: pipeline/architecture.md
    - Agent Instructions: pipeline/agent-instructions.md
    - Cost & Progress: pipeline/progress.md
  - Methodology:
    - Lens Router: methodology/lens-router.md
    - Reachability Verify: methodology/reachability.md
    - Pattern Library: methodology/patterns.md
  - Experiments:
    - Experiment Map: experiments/map.md
    - "Exp 01: WooCommerce Exhaustive": experiments/exp01.md
    - "Exp 02: CVE Rediscovery": experiments/exp02.md
    - "Exp 03: Smart Slider 3": experiments/exp03.md
    - "Exp 04: Batch Dilution": experiments/exp04.md
    - "Exp 05: Sonnet Barebones": experiments/exp05.md
    - "Exp 06: Access Control Lens": experiments/exp06.md
    - "Exp 07: A/B Validation": experiments/exp07.md
    - Methodology Fixes: experiments/methodology-fixes.md
  - Findings:
    - Overview: findings/index.md
    - WordPress:
      - Ultimate Member: findings/ultimate-member.md
      - Advanced Google reCAPTCHA: findings/advanced-google-recaptcha.md
      - Smart Slider 3: findings/smart-slider-3.md
      - WooCommerce CVE-2021-32790: findings/cve-2021-32790.md
    - JS/npm Pipeline:
      - Overview: findings/js-npm/index.md
      - decompress: findings/js-npm/decompress.md
      - simple-get: findings/js-npm/simple-get.md
      - xml-encryption: findings/js-npm/xml-encryption.md
      - node-rsa: findings/js-npm/node-rsa.md
      - private-ip: findings/js-npm/private-ip.md
      - method-override: findings/js-npm/method-override.md
      - multiparty: findings/js-npm/multiparty.md
      - saml2-js: findings/js-npm/saml2-js.md
      - request-ip: findings/js-npm/request-ip.md
      - ssrf-req-filter: findings/js-npm/ssrf-req-filter.md
      - url-join: findings/js-npm/url-join.md
      - ip: findings/js-npm/ip.md
      - convict: findings/js-npm/convict.md
      - st: findings/js-npm/st.md
    - Web-Tech n-Days:
      - Overview: findings/web-tech-ndays/index.md
