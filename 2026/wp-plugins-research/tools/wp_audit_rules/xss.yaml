rules:
  - id: wp-xss-echo-get
    message: >
      Unescaped output of $_GET data may allow Cross-Site Scripting (XSS).
      Use esc_html(), esc_attr(), esc_url(), or wp_kses() before echoing user input.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    pattern: echo $_GET[...];

  - id: wp-xss-echo-post
    message: >
      Unescaped output of $_POST data may allow Cross-Site Scripting (XSS).
      Use esc_html(), esc_attr(), esc_url(), or wp_kses() before echoing user input.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    pattern: echo $_POST[...];

  - id: wp-xss-echo-request
    message: >
      Unescaped output of $_REQUEST data may allow Cross-Site Scripting (XSS).
      Use esc_html(), esc_attr(), esc_url(), or wp_kses() before echoing user input.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    pattern: echo $_REQUEST[...];

  - id: wp-xss-echo-server
    message: >
      Unescaped output of $_SERVER data may allow Cross-Site Scripting (XSS).
      Use esc_html() or esc_url() before echoing server variables.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    pattern: echo $_SERVER[...];

  - id: wp-xss-print-get
    message: >
      Unescaped print() of $_GET data may allow Cross-Site Scripting (XSS).
      Use esc_html(), esc_attr(), or esc_url() to sanitize before output.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    patterns:
      - pattern: print($_GET[...]);
      - pattern: print($_POST[...]);
      - pattern: print($_REQUEST[...]);

  - id: wp-xss-echo-interpolation-get
    message: >
      String interpolation of $_GET/$_POST/$_REQUEST in an echo statement may allow XSS.
      Escape the value before outputting it.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: xss
      cwe: "CWE-79"
      confidence: HIGH
    patterns:
      - pattern: echo "..." . $_GET[...] . "...";
      - pattern: echo "..." . $_POST[...] . "...";
      - pattern: echo "..." . $_REQUEST[...] . "...";
      - pattern: echo "..." . $_SERVER[...] . "...";
