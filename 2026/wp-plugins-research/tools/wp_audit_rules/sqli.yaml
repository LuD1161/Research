rules:
  - id: wp-sqli-query-no-prepare
    message: >
      Direct use of $wpdb->query() with string interpolation may allow SQL injection.
      Use $wpdb->prepare() to parameterize queries.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: sql-injection
      cwe: "CWE-89"
      confidence: MEDIUM
    patterns:
      - pattern: $wpdb->query("..." . $_GET[...] . "...")
      - pattern: $wpdb->query("..." . $_POST[...] . "...")
      - pattern: $wpdb->query("..." . $_REQUEST[...] . "...")

  - id: wp-sqli-get-var-no-prepare
    message: >
      Direct use of $wpdb->get_var() with string interpolation may allow SQL injection.
      Use $wpdb->prepare() to parameterize queries.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: sql-injection
      cwe: "CWE-89"
      confidence: MEDIUM
    patterns:
      - pattern: $wpdb->get_var("..." . $_GET[...] . "...")
      - pattern: $wpdb->get_var("..." . $_POST[...] . "...")
      - pattern: $wpdb->get_var("..." . $_REQUEST[...] . "...")

  - id: wp-sqli-get-results-no-prepare
    message: >
      Direct use of $wpdb->get_results() with string interpolation may allow SQL injection.
      Use $wpdb->prepare() to parameterize queries.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: sql-injection
      cwe: "CWE-89"
      confidence: MEDIUM
    patterns:
      - pattern: $wpdb->get_results("..." . $_GET[...] . "...")
      - pattern: $wpdb->get_results("..." . $_POST[...] . "...")
      - pattern: $wpdb->get_results("..." . $_REQUEST[...] . "...")

  - id: wp-sqli-get-row-no-prepare
    message: >
      Direct use of $wpdb->get_row() with string interpolation may allow SQL injection.
      Use $wpdb->prepare() to parameterize queries.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: sql-injection
      cwe: "CWE-89"
      confidence: MEDIUM
    patterns:
      - pattern: $wpdb->get_row("..." . $_GET[...] . "...")
      - pattern: $wpdb->get_row("..." . $_POST[...] . "...")
      - pattern: $wpdb->get_row("..." . $_REQUEST[...] . "...")

  - id: wp-sqli-variable-in-query
    message: >
      Passing a variable directly to $wpdb query methods without prepare() may allow SQL injection.
      Use $wpdb->prepare() to safely parameterize queries.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: sql-injection
      cwe: "CWE-89"
      confidence: LOW
    patterns:
      - pattern-either:
          - pattern: $wpdb->query($SQL)
          - pattern: $wpdb->get_results($SQL)
          - pattern: $wpdb->get_var($SQL)
          - pattern: $wpdb->get_row($SQL)
      - pattern-not: $wpdb->query($wpdb->prepare(...))
      - pattern-not: $wpdb->get_results($wpdb->prepare(...))
      - pattern-not: $wpdb->get_var($wpdb->prepare(...))
      - pattern-not: $wpdb->get_row($wpdb->prepare(...))
