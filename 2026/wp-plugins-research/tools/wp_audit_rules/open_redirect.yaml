rules:
  - id: wp-redirect-get-input
    message: >
      wp_redirect() called with user-controlled input from $_GET. This allows open redirect
      attacks where users are sent to malicious external sites. Use wp_safe_redirect() instead,
      which restricts redirects to the same host, or validate the URL against an allowlist.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: open-redirect
      cwe: "CWE-601"
      confidence: HIGH
    pattern: wp_redirect($_GET[...]);

  - id: wp-redirect-post-input
    message: >
      wp_redirect() called with user-controlled input from $_POST. This allows open redirect
      attacks. Use wp_safe_redirect() or validate the URL against an allowlist.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: open-redirect
      cwe: "CWE-601"
      confidence: HIGH
    pattern: wp_redirect($_POST[...]);

  - id: wp-redirect-request-input
    message: >
      wp_redirect() called with user-controlled input from $_REQUEST. This allows open redirect
      attacks. Use wp_safe_redirect() or validate the URL against an allowlist.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: open-redirect
      cwe: "CWE-601"
      confidence: HIGH
    pattern: wp_redirect($_REQUEST[...]);

  - id: wp-redirect-instead-of-safe-redirect
    message: >
      wp_redirect() does not restrict the redirect target to the current host; consider
      using wp_safe_redirect() to prevent open redirect vulnerabilities when the URL may
      be influenced by user input.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: open-redirect
      cwe: "CWE-601"
      confidence: LOW
    pattern: wp_redirect($URL);

  - id: wp-header-location-user-input
    message: >
      header('Location: ...') with user-controlled input enables open redirect. Use
      wp_safe_redirect() instead or validate and sanitize the URL.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: open-redirect
      cwe: "CWE-601"
      confidence: HIGH
    patterns:
      - pattern: header("Location: " . $_GET[...]);
      - pattern: header("Location: " . $_POST[...]);
      - pattern: header("Location: " . $_REQUEST[...]);
