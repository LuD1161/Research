rules:
  - id: wp-rce-eval-usage
    message: >
      Use of eval() is dangerous and can lead to Remote Code Execution (RCE).
      Avoid eval() entirely; find an alternative implementation.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-94"
      confidence: HIGH
    pattern: eval(...);

  - id: wp-rce-eval-post-data
    message: >
      Passing $_POST data to eval() allows direct Remote Code Execution (RCE).
      Remove eval() and find a safe alternative.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-94"
      confidence: HIGH
    patterns:
      - pattern: eval($_POST[...]);
      - pattern: eval($_GET[...]);
      - pattern: eval($_REQUEST[...]);

  - id: wp-rce-assert-variable
    message: >
      Passing a variable to assert() can execute arbitrary code (RCE).
      Do not pass user-controlled or dynamic strings to assert().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-94"
      confidence: MEDIUM
    pattern: assert($VAR);

  - id: wp-rce-create-function
    message: >
      create_function() is deprecated and equivalent to eval(); it allows RCE.
      Replace with proper closures or named functions.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-94"
      confidence: HIGH
    pattern: create_function(..., ...);

  - id: wp-rce-system-user-input
    message: >
      Passing user-supplied input to system() may allow OS command injection (RCE).
      Validate and sanitize all input; use escapeshellarg()/escapeshellcmd().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-78"
      confidence: HIGH
    patterns:
      - pattern: system($_GET[...]);
      - pattern: system($_POST[...]);
      - pattern: system($_REQUEST[...]);

  - id: wp-rce-exec-user-input
    message: >
      Passing user-supplied input to exec() may allow OS command injection (RCE).
      Validate and sanitize all input; use escapeshellarg()/escapeshellcmd().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-78"
      confidence: HIGH
    patterns:
      - pattern: exec($_GET[...]);
      - pattern: exec($_POST[...]);
      - pattern: exec($_REQUEST[...]);

  - id: wp-rce-passthru-user-input
    message: >
      Passing user-supplied input to passthru() may allow OS command injection (RCE).
      Validate and sanitize all input; use escapeshellarg()/escapeshellcmd().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-78"
      confidence: HIGH
    patterns:
      - pattern: passthru($_GET[...]);
      - pattern: passthru($_POST[...]);
      - pattern: passthru($_REQUEST[...]);

  - id: wp-rce-shell-exec-user-input
    message: >
      Passing user-supplied input to shell_exec() may allow OS command injection (RCE).
      Validate and sanitize all input; use escapeshellarg()/escapeshellcmd().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: rce
      cwe: "CWE-78"
      confidence: HIGH
    patterns:
      - pattern: shell_exec($_GET[...]);
      - pattern: shell_exec($_POST[...]);
      - pattern: shell_exec($_REQUEST[...]);
