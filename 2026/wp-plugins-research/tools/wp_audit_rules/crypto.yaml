rules:
  - id: wp-crypto-md5-password
    message: >
      md5() is a fast, cryptographically broken hash and must not be used for passwords.
      Use WordPress's wp_hash_password() (which uses bcrypt) or PHP's password_hash()
      with PASSWORD_BCRYPT or PASSWORD_ARGON2ID.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-916"
      confidence: MEDIUM
    patterns:
      - pattern: md5($PASSWORD);
      - pattern: $HASH = md5($_POST[...]);
      - pattern: $HASH = md5($_GET[...]);

  - id: wp-crypto-sha1-password
    message: >
      sha1() is a cryptographically weak hash function not suitable for password storage.
      Use wp_hash_password() or password_hash() with a modern algorithm.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-916"
      confidence: MEDIUM
    pattern: sha1($PASSWORD);

  - id: wp-crypto-rand-security-token
    message: >
      rand() is not cryptographically secure and must not be used to generate security
      tokens, nonces, or passwords. Use wp_generate_password() or random_bytes() instead.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-338"
      confidence: MEDIUM
    patterns:
      - pattern: $TOKEN = rand(...);
      - pattern: $NONCE = rand(...);
      - pattern: $SECRET = rand(...);
      - pattern: $KEY = rand(...);

  - id: wp-crypto-mt-rand-security-token
    message: >
      mt_rand() is not cryptographically secure and must not be used to generate security
      tokens, nonces, passwords, or salts. Use wp_generate_password() or random_bytes().
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-338"
      confidence: MEDIUM
    patterns:
      - pattern: $TOKEN = mt_rand(...);
      - pattern: $NONCE = mt_rand(...);
      - pattern: $SECRET = mt_rand(...);
      - pattern: $KEY = mt_rand(...);

  - id: wp-crypto-weak-hash-general
    message: >
      md5() used for hashing data. If this value is used for authentication, integrity
      verification, or token generation, md5 is insufficient. Use a stronger algorithm.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-327"
      confidence: LOW
    pattern: md5(...);

  - id: wp-crypto-openssl-random-pseudo-not-strong
    message: >
      openssl_random_pseudo_bytes() without checking the $crypto_strong output parameter
      may return non-cryptographically-strong bytes on some systems. Always check the
      second argument or prefer random_bytes() which throws on failure.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: weak-cryptography
      cwe: "CWE-338"
      confidence: LOW
    pattern: openssl_random_pseudo_bytes($LEN);
