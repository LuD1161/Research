rules:
  - id: wp-deser-unserialize-user-input-get
    message: >
      Calling unserialize() on $_GET data can lead to PHP Object Injection.
      Attackers may craft gadget chains to achieve RCE, file writes, or other impacts.
      Use JSON (json_decode) instead, or pass allowed_classes => false.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: deserialization
      cwe: "CWE-502"
      confidence: HIGH
    pattern: unserialize($_GET[...]);

  - id: wp-deser-unserialize-user-input-post
    message: >
      Calling unserialize() on $_POST data can lead to PHP Object Injection.
      Attackers may craft gadget chains to achieve RCE, file writes, or other impacts.
      Use JSON (json_decode) instead, or pass allowed_classes => false.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: deserialization
      cwe: "CWE-502"
      confidence: HIGH
    pattern: unserialize($_POST[...]);

  - id: wp-deser-unserialize-user-input-request
    message: >
      Calling unserialize() on $_REQUEST data can lead to PHP Object Injection.
      Use JSON (json_decode) instead, or pass allowed_classes => false.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: deserialization
      cwe: "CWE-502"
      confidence: HIGH
    pattern: unserialize($_REQUEST[...]);

  - id: wp-deser-unserialize-no-allowed-classes
    message: >
      unserialize() called without the allowed_classes option set to false (or a whitelist).
      Without this restriction, all classes available in the autoloader may be instantiated,
      enabling Object Injection attacks. Use unserialize($data, ['allowed_classes' => false]).
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: deserialization
      cwe: "CWE-502"
      confidence: LOW
    patterns:
      - pattern: unserialize($DATA)
      - pattern-not: unserialize($DATA, array('allowed_classes' => false))
      - pattern-not: unserialize($DATA, array('allowed_classes' => array(...)))

  - id: wp-deser-maybe-unserialize-user-input
    message: >
      maybe_unserialize() on user-supplied data may trigger PHP Object Injection.
      Avoid deserializing untrusted data or restrict with allowed_classes.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: deserialization
      cwe: "CWE-502"
      confidence: HIGH
    pattern-either:
      - pattern: maybe_unserialize($_GET[...])
      - pattern: maybe_unserialize($_POST[...])
      - pattern: maybe_unserialize($_REQUEST[...])
