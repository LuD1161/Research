rules:
  - id: wp-ssrf-remote-get-user-url-get
    message: >
      wp_remote_get() called with a URL derived from $_GET. An attacker can supply an
      internal URL to probe internal services (SSRF). Validate and whitelist URLs before
      making outbound requests. Use wp_http_validate_url() and check against an allowlist.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: HIGH
    pattern: wp_remote_get($_GET[...]);

  - id: wp-ssrf-remote-get-user-url-post
    message: >
      wp_remote_get() called with a URL derived from $_POST. An attacker can supply an
      internal URL to probe internal services (SSRF). Validate and whitelist URLs.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: HIGH
    pattern: wp_remote_get($_POST[...]);

  - id: wp-ssrf-remote-post-user-url-get
    message: >
      wp_remote_post() called with a URL derived from $_GET. An attacker can supply an
      internal URL to probe or interact with internal services (SSRF).
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: HIGH
    pattern: wp_remote_post($_GET[...]);

  - id: wp-ssrf-remote-post-user-url-post
    message: >
      wp_remote_post() called with a URL derived from $_POST. An attacker can supply an
      internal URL to probe or interact with internal services (SSRF).
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: HIGH
    pattern: wp_remote_post($_POST[...]);

  - id: wp-ssrf-remote-request-variable-url
    message: >
      wp_remote_request() called with a potentially user-controlled URL variable.
      Validate the URL against an allowlist before making outbound HTTP requests.
    severity: WARNING
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: LOW
    patterns:
      - pattern: wp_remote_request($URL, ...);
      - pattern: wp_remote_get($URL, ...);
      - pattern: wp_remote_post($URL, ...);

  - id: wp-ssrf-curl-user-url
    message: >
      curl_setopt() with CURLOPT_URL set from user input ($_GET/$_POST) enables SSRF.
      Validate the URL against a strict allowlist before use.
    severity: ERROR
    languages: [php]
    metadata:
      category: security
      subcategory: ssrf
      cwe: "CWE-918"
      confidence: HIGH
    patterns:
      - pattern: curl_setopt($CH, CURLOPT_URL, $_GET[...]);
      - pattern: curl_setopt($CH, CURLOPT_URL, $_POST[...]);
      - pattern: curl_setopt($CH, CURLOPT_URL, $_REQUEST[...]);
