site_name: WordPress Plugin Security Research
site_description: Systematic security audit of the top 200 most-installed WordPress plugins
site_author: Security Research Team

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Reports:
    - Executive Summary: reports/executive_summary.md
    - Critical Findings: reports/critical_findings.md
    - Methodology: reports/methodology.md
  - Confirmed Findings:
    - Overview: findings/index.md
    - Critical:
      - "NextGEN Gallery — ZIP Slip RCE": findings/nextgen-gallery-zip-slip-rce.md
      - "Forminator — Unauth File Upload": findings/forminator-unauth-file-upload.md
    - High:
      - "Ninja Forms — Stored XSS": findings/ninja-forms-stored-xss.md
      - "Ninja Forms — Object Injection": findings/ninja-forms-object-injection.md
      - "WP Google Maps — Unauth Class Instantiation": findings/wp-google-maps-unauth-class.md
      - "Kirki — Unauth REST Endpoints": findings/kirki-unauth-rest.md
      - "Shortcodes Ultimate — Stored XSS": findings/shortcodes-ultimate-xss.md
      - "Kadence Blocks — SVG XSS": findings/kadence-blocks-svg-xss.md
      - "Metform — Unauth File Upload": findings/metform-unauth-upload.md
      - "Redirection — Object Injection": findings/redirection-object-injection.md
    - Medium:
      - "The Events Calendar — Stored XSS (x3)": findings/events-calendar-xss.md
      - "Essential Addons — Nonce Vending": findings/essential-addons-nonce.md
      - "Premium Addons — Zero-Auth Rendering": findings/premium-addons-rendering.md
      - "Other Medium Findings": findings/medium-findings.md
    - Low / Informational:
      - "Defense-in-Depth Issues": findings/defense-in-depth.md
  - Unauth Surface Audits:
    - Template Rendering: audits/template-rendering.md
    - WooCommerce & Addons: audits/woo-eael-insta.md
    - REST APIs & Connect Flows: audits/rest-connect-flows.md
    - Jetpack Remote File Ops: audits/jetpack-remote-files.md
  - Reference:
    - Anti-Patterns (12 patterns that defeat static analysis): reference/anti-patterns.md
    - Research Specification: reference/spec.md
