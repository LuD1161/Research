services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "wp", "-pwp"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - db_data:/var/lib/mysql

  wp:
    image: wordpress:6-php8.2-apache
    depends_on:
      db: { condition: service_healthy }
    ports:
      - "8101:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./plugin/essential-addons-for-elementor-lite:/var/www/html/wp-content/plugins/essential-addons-for-elementor-lite:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 3s
      timeout: 5s
      retries: 30

volumes:
  db_data:
  wp_data:
